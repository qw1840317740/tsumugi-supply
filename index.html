  <script>
    const I = window.ICON || {};
    const set = (id,h)=>{ const e=document.getElementById(id); if(e) e.innerHTML=h; };
    function injectIcons(){
      set('heroBadgeIc', I.box);
      set('icTruck', I.truck); set('icShield', I.shield); set('icYen', I.yen);
      set('icClock', I.clock); set('icLayers', I.layers);
      set('seeAllArr', I.arrow); set('brandsArr', I.arrow); set('howArr', I.arrow);
      set('icLeaf', I.leaf); set('icTag2', I.layers); set('icShip2', I.ship); set('icShield2', I.shield);
      set('crPhil', I.spark); set('crLic', I.shield); set('crArea', I.globe);
      set('ctaChatIc', I.phone);
    }
    const catIcons = { health:I.check, beauty:I.spark, daily:I.box, food:I.leaf,
      sweets:I.spark, babykids:I.leaf, hobby:I.tag, seasonaltop:I.box };
    function kindLoc(k){
      return (k && t('c.'+k) !== ('c.'+k)) ? t('c.'+k) : k;
    }
    function render(){
      const catGrid = document.getElementById('catGrid');
      if(catGrid) catGrid.innerHTML = CATEGORIES.map(c=>{
        const n = PRODUCTS.filter(p=>p.category===c.id).length;
        const usedSubs = (c.subs||[]).filter(s=>s.count>0).length;
        return `<a class="cat-card reveal" href="products.html?cat=${c.id}">
          <div class="ic">${catIcons[c.id]||I.box}</div>
          <div><h4>${t('c.'+c.id)}</h4><div class="count">${n} ${t(n===1?'cat.skus':'cat.skusPl')} · ${usedSubs} ${t('cat.subs')}</div></div>
          <span class="arr">${I.arrow}</span>
        </a>`;
      }).join('');

      const fg = document.getElementById('featuredGrid');
      if(fg) fg.innerHTML = PRODUCTS.filter(p=>p.tag).slice(0,8).map(productCard).join('');

      const bs = document.getElementById('brandStrip');
      if(bs) bs.innerHTML = BRANDS.slice(0,8).map(b=>`
        <a class="brand-card reveal" href="brands.html#${b.name}">
          <div class="bj"><span class="k" style="background:${b.hue}">${b.kana}</span><div><h4>${b.name}</h4><p>${kindLoc(b.kind)}</p></div></div>
          <p>${b.blurb}</p>
          <span class="mk">${b.items} ${t('bs.products')} →</span>
        </a>`).join('');

      const steps = [
        {n:'1', t:t('s1t'), d:t('s1d')},
        {n:'2', t:t('s2t'), d:t('s2d')},
        {n:'3', t:t('s3t'), d:t('s3d')},
        {n:'4', t:t('s4t'), d:t('s4d')},
      ];
      const st = document.getElementById('stepsTeaser');
      if(st) st.innerHTML = steps.map((s,i)=>`
        <div class="step reveal">
          <div class="n">${s.n}</div><h4>${s.t}</h4><p>${s.d}</p>
          ${i<3?`<span class="step-line"></span>`:''}
        </div>`).join('');
    }
    injectIcons();
    addRenderer(render);
    render();
    requestAnimationFrame(()=>revealObs());
  </script>
