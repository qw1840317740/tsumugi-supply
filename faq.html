  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Do I need to pay to request a quote?","acceptedAnswer":{"@type":"Answer","text":"No. Adding products to your cart and submitting a request is completely free — we email a proforma invoice with final pricing and shipping, and you decide whether to proceed before any payment."}},{"@type":"Question","name":"What is the minimum order amount?","acceptedAnswer":{"@type":"Answer","text":"The minimum order is ¥25,000 JPY (subtotal, before shipping). The cart shows live progress toward the threshold, and volume discounts apply as your subtotal grows."}},{"@type":"Question","name":"Are all products authentic and sourced in Japan?","acceptedAnswer":{"@type":"Answer","text":"Yes. Every item is sourced through authorised Japanese distribution channels. We verify serial and lot codes and can provide documentation on request."}},{"@type":"Question","name":"Which payment methods do you accept?","acceptedAnswer":{"@type":"Answer","text":"Wise bank transfer (recommended — no handling fee), PayPal, and credit card. Card and PayPal carry a 3% handling fee. For T/T bank transfers, both sides' bank charges are borne by the buyer."}},{"@type":"Question","name":"How is shipping calculated?","acceptedAnswer":{"@type":"Answer","text":"Shipping depends on destination, total weight and the method you choose (EMS air or consolidated sea). A draft estimate appears in your cart; the exact freight is confirmed in your proforma invoice. Orders over 30 kg are re-quoted for precision."}},{"@type":"Question","name":"How long until my order ships?","acceptedAnswer":{"@type":"Answer","text":"Orders are typically ready at our warehouse within 7 business days of payment, then dispatched. Single-SKU orders of 3+ cartons may take a little longer — we confirm timelines before you pay."}},{"@type":"Question","name":"Can I get a better price on large volumes?","acceptedAnswer":{"@type":"Answer","text":"Yes. Automatic volume discounts apply from ¥100,000, and we quote bespoke pricing on 5,000+ pieces per SKU. Contact us on WhatsApp or email for a bulk quote."}},{"@type":"Question","name":"Can you consolidate multiple brands into one shipment?","acceptedAnswer":{"@type":"Answer","text":"Yes — consolidation is core to what we do. We combine multiple brands and categories into a single air or sea shipment to lower your landed cost and simplify customs."}},{"@type":"Question","name":"What if a product is out of stock or renewed?","acceptedAnswer":{"@type":"Answer","text":"We always ship the latest available packaging and notify you of any product renewals or discontinuations. If a requested item is unavailable, we suggest the closest equivalent before invoicing."}},{"@type":"Question","name":"Can I become an exclusive distributor?","acceptedAnswer":{"@type":"Answer","text":"Possibly. We work with exclusive distributors in select markets. Tell us about your business and territory via the product request form and our team will follow up."}}]}</script>
