<body>

      <p data-i18n="shop.lead"></p>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">
      <div class="shop">
        <details class="filters" id="filtersPanel" open>
          <summary class="filters-toggle">
            <span class="filters-toggle-ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
            </span>
            <span data-i18n="shop.filterToggle">Filters</span>
            <span class="filters-count" id="filtersCount"></span>
          </summary>
          <div class="filters-body">
            <div class="filter-group">
              <h4 data-i18n="shop.cat"></h4>
              <ul id="filterCats"></ul>
            </div>
            <div class="filter-group">
              <h4 data-i18n="shop.brand"></h4>
              <ul id="filterBrands"></ul>
            </div>
            <div class="filter-group">
              <label class="check-row"><input type="checkbox" id="inStock"> <span data-i18n="shop.inStock"></span></label>
            </div>
            <a class="btn btn-ghost btn-block" href="how-to-order.html#request" data-i18n="shop.cantFind"></a>
          </div>
        </details>

        <div>
          <div class="shop-bar">
            <div class="res"><b id="resCount">0</b> <span data-i18n="shop.results"></span> · <span class="muted" id="resCat"></span></div>
            <div class="tools">
              <div class="search-box">
                <span id="searchIc"></span>
                <input type="search" id="shopSearch" data-i18n-ph="shop.search">
              </div>
              <select class="select" id="shopSort">
                <option value="featured" data-i18n="shop.sortFeatured"></option>
                <option value="brand" data-i18n="shop.sortBrand"></option>
              </select>
            </div>
          </div>
          <div class="active-filters" id="activeFilters" style="display:none"></div>
          <div class="product-grid" id="productGrid"></div>
          <div id="loadMoreWrap" class="load-more-wrap" style="display:none">
            <p class="muted load-more-lbl" id="loadMoreLbl"></p>
            <button class="btn btn-primary" id="loadMoreBtn" data-i18n="shop.loadMore"></button>
          </div>
        </div>
      </div>
    </div>

    document.getElementById('searchIc').innerHTML = ICON.search;

      document.getElementById('filtersPanel')?.removeAttribute('open');
    }
