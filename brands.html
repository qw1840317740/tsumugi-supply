<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span class="sep">/</span><span class="cur" data-i18n="nav.brands"></span></div>
      <span class="eyebrow" data-i18n="bp.eyebrow"></span>
      <h1 class="tight" style="margin-top:12px" data-i18n="bp.title"></h1>
      <p data-i18n="bp.lead"></p>
      <div class="az-index" id="azIndex" style="margin-top:26px"></div>
    </div>
  </section>

  <section class="section-sm">
    <div class="container" id="brandDirectory"></div>
  </section>

  <div id="site-footer"></div>
  <script src="assets/js/data.js?v=26"></script>
  <script src="assets/js/i18n.js?v=26"></script>
  <script src="assets/js/app.js?v=26"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    function render(){
      const letters = [...new Set(BRANDS.map(b=>b.letter))].sort();
      const az = document.getElementById('azIndex');
      az.innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(L=>{
        const has = letters.includes(L);
        return `<a href="#letter-${L}" class="${has?'':'dis'}">${L}</a>`;
      }).join('');

      const dir = document.getElementById('brandDirectory');
      dir.innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(L=>{
        const list = BRANDS.filter(b=>b.letter===L);
        if(!list.length) return '';
        const cnt = list.length;
        return `<div id="letter-${L}">
          <div class="brand-letter">${L} <small>${cnt} ${t(cnt>1?'bp.brandsPl':'bp.brands')}</small></div>
          <div class="brand-grid">
            ${list.map(b=>`
              <a class="brand-card" id="${b.name}" href="products.html">
                <div class="bj">${brandLogo(b,56)}<div><h4>${b.name}</h4><p>${t('c.'+b.kind)}</p></div></div>
                <p>${b.blurb}</p>
                <span class="mk">${b.items} ${t('bp.products')}</span>
              </a>`).join('')}
          </div>
        </div>`;
      }).join('');
    }
    addRenderer(render);
    render();
    requestAnimationFrame(()=>revealObs());
  </script>
</body>
