  <script>
    // Wait for app.js (defer) to define ICON/handleInquiry before running.
    // Without this wrapper, the script runs while app.js is still loading,
    // so ICON is undefined and a ReferenceError aborts the pre-fill below.
    window.addEventListener('DOMContentLoaded', function(){
    const set=(id,h)=>{const e=document.getElementById(id);if(e)e.innerHTML=h;};
    function injectIcons(){
      set('moqIc', ICON.info);
      set('s1', ICON.cart); set('s2', ICON.mail); set('s3', ICON.yen); set('s4', ICON.truck);
      set('fShip1', ICON.truck); set('fShip2', ICON.ship); set('fShip3', ICON.box);
      set('ciWhats', ICON.phone); set('ciMail', ICON.mail); set('ciPhone', ICON.info);
      document.querySelectorAll('.ok-ic').forEach(e=>e.innerHTML=ICON.check);
    }
    injectIcons();
    // Pre-fill the inquiry form when arriving from a product page (?product=...)
    (function(){
      const p = new URLSearchParams(location.search);
      const product = p.get('product');
      if(!product) return;
      const name = p.get('name') || '';
      const brand = p.get('brand') || '';
      const prodEl = document.getElementById('reqProduct');
      const brandEl = document.getElementById('reqBrand');
      if(prodEl && !prodEl.value) prodEl.value = name ? `${name} (${product})` : product;
      if(brandEl && !brandEl.value && brand) brandEl.value = brand;
      // Strip the #request hash so the browser doesn't fire its own
      // scroll-into-view before we get a chance to compute the offset.
      if(location.hash){
        history.replaceState(null, '', location.pathname + location.search);
      }
      // Highlight the request section so the user sees the prefill, and
      // scroll past the sticky header so the section heading is actually
      // visible (scrollIntoView ignores fixed/sticky nav chrome).
      // The header is mounted by app.js's mount() after this script runs,
      // so wait for two RAFs and then re-measure the nav height.
      const sec = document.getElementById('request');
      if(sec){
        const doScroll = () => {
          const nav = document.querySelector('.site-header');
          const navH = nav ? nav.getBoundingClientRect().height : 0;
          const top = sec.getBoundingClientRect().top + window.scrollY - navH - 18;
          window.scrollTo({top: Math.max(0, top), behavior:'smooth'});
          sec.classList.add('req-highlight');
          setTimeout(()=>sec.classList.remove('req-highlight'), 2400);
        };
        // Wait until the site header actually exists, then RAF twice so its
        // sticky/transform styles settle before we measure.
        const wait = () => {
          if(document.querySelector('.site-header')) requestAnimationFrame(()=>requestAnimationFrame(doScroll));
          else requestAnimationFrame(wait);
        };
        wait();
      }
    })();
    }); // end DOMContentLoaded
  </script>
