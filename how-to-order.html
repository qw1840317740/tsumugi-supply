<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>How to Order — Japan Wholesale Export | Kaisei</title>
  <meta name="description" content="Order Japanese daily goods wholesale in four steps: add to cart, get a proforma invoice in one business day, pay securely, and we ship worldwide. Minimum order ¥25,000 JPY.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=12">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <meta name="theme-color" content="#21463D">
  <meta name="color-scheme" content="light">
  <link rel="canonical" href="https://www.kaiseisg.com/how-to-order.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="KAISEI SANGYOU LLC">
  <meta property="og:title" content="How to Order — Japan Wholesale Export | Kaisei">
  <meta property="og:description" content="Four steps to order Japanese daily goods wholesale: cart, proforma invoice, secure payment, worldwide shipping.">
  <meta property="og:url" content="https://www.kaiseisg.com/how-to-order.html">
  <meta property="og:image" content="https://www.kaiseisg.com/assets/og.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_CN">
  <meta property="og:locale:alternate" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="How to Order — Japan Wholesale Export | Kaisei">
  <meta name="twitter:description" content="Four steps: cart, proforma invoice, secure payment, worldwide shipping.">
  <meta name="twitter:image" content="https://www.kaiseisg.com/assets/og.svg">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"KAISEI SANGYOU LLC","url":"https://www.kaiseisg.com/","logo":"https://www.kaiseisg.com/assets/favicon.svg","email":"info@kaiseisg.com"}</script>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://www.kaiseisg.com/"},{"@type":"ListItem","position":2,"name":"How to Order","item":"https://www.kaiseisg.com/how-to-order.html"}]}</script>
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span class="sep">/</span><span class="cur" data-i18n="nav.howto"></span></div>
      <span class="eyebrow" data-i18n="ht.eyebrow"></span>
      <h1 class="tight" style="margin-top:12px" data-i18n="ht.title"></h1>
      <p data-i18n="ht.lead"></p>
      <div style="display:inline-flex;gap:10px;align-items:center;background:var(--clay);color:#fff;padding:9px 16px;border-radius:999px;margin-top:22px;font-size:.9rem;font-weight:600">
        <span id="moqIc"></span> <span data-i18n="ht.moq"></span>
      </div>
    </div>
  </section>

  <!-- STEPS -->
  <section class="section">
    <div class="container">
      <div class="steps">
        <div class="step">
          <div class="n">1</div>
          <h4 data-i18n="s1t"></h4>
          <p data-i18n="s1d"></p>
          <div class="mini"><span id="s1"></span> <span data-i18n="ht.s1m"></span></div>
          <span class="step-line"></span>
        </div>
        <div class="step">
          <div class="n">2</div>
          <h4 data-i18n="s2t"></h4>
          <p data-i18n="s2d"></p>
          <div class="mini"><span id="s2"></span> <span data-i18n="ht.s2m"></span></div>
          <span class="step-line"></span>
        </div>
        <div class="step">
          <div class="n">3</div>
          <h4 data-i18n="s3t"></h4>
          <p data-i18n="s3d"></p>
          <div class="mini"><span id="s3"></span> <span data-i18n="ht.s3m"></span></div>
          <span class="step-line"></span>
        </div>
        <div class="step">
          <div class="n">4</div>
          <h4 data-i18n="s4t"></h4>
          <p data-i18n="s4d"></p>
          <div class="mini"><span id="s4"></span> <span data-i18n="ht.s4m"></span></div>
        </div>
      </div>
    </div>
  </section>

  <!-- VOLUME DISCOUNT -->
  <section class="section-sm" id="discount" style="background:var(--paper-3);border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)">
    <div class="container">
      <div class="vd-split">
        <div>
          <span class="eyebrow" data-i18n="vd.eyebrow"></span>
          <h2 class="h" style="margin-top:14px" data-i18n="vd.title"></h2>
          <p class="lead" style="margin-top:16px" data-i18n="vd.lead"></p>
          <a class="btn btn-primary" href="products.html" style="margin-top:22px" data-i18n="vd.cta"></a>
        </div>
        <div class="table-card">
          <table class="t">
            <thead><tr><th data-i18n="vd.subtotal"></th><th data-i18n="vd.discount"></th><th data-i18n="vd.save"></th></tr></thead>
            <tbody>
              <tr><td data-i18n="vd.t1"></td><td data-i18n="vd.std"></td><td data-i18n="vd.dash"></td></tr>
              <tr><td data-i18n="vd.t2"></td><td><b>−3%</b></td><td><span class="badge-ok"><span class="ok-ic"></span> <span data-i18n="vd.bronze"></span></span></td></tr>
              <tr><td data-i18n="vd.t3"></td><td><b>−6%</b></td><td><span class="badge-ok"><span class="ok-ic"></span> <span data-i18n="vd.silver"></span></span></td></tr>
              <tr><td data-i18n="vd.t4"></td><td><b>−9%</b></td><td><span class="badge-ok"><span class="ok-ic"></span> <span data-i18n="vd.gold"></span></span></td></tr>
              <tr><td data-i18n="vd.t5"></td><td><b>−12%</b></td><td><span class="badge-ok"><span class="ok-ic"></span> <span data-i18n="vd.plat"></span></span></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <!-- SHIPPING -->
  <section class="section" id="shipping">
    <div class="container">
      <div class="section-head center">
        <span class="eyebrow center" data-i18n="ship.eyebrow"></span>
        <h2 class="h" style="margin-top:14px" data-i18n="ship.title"></h2>
      </div>
      <div class="feature-row">
        <div class="feature">
          <div class="ic"><span id="fShip1"></span></div>
          <h4 data-i18n="sh1.t"></h4>
          <p data-i18n="sh1.d"></p>
          <p class="muted" style="font-size:.84rem;margin-top:10px" data-i18n="sh1.p"></p>
        </div>
        <div class="feature">
          <div class="ic"><span id="fShip2"></span></div>
          <h4 data-i18n="sh2.t"></h4>
          <p data-i18n="sh2.d"></p>
          <p class="muted" style="font-size:.84rem;margin-top:10px" data-i18n="sh2.p"></p>
        </div>
      </div>
      <p class="center muted" style="margin-top:24px;font-size:.86rem" data-i18n="ship.note"></p>
    </div>
  </section>

  <!-- REQUEST FORM -->
  <section class="section-sm" id="request" style="background:var(--paper-3);border-top:1px solid var(--line-soft)">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <span class="eyebrow" data-i18n="req.eyebrow"></span>
          <h2 class="h" style="margin-top:14px" data-i18n="req.title"></h2>
          <p class="lead" style="margin-top:14px" data-i18n="req.lead"></p>
          <div style="margin-top:24px">
            <div class="row"><div class="ic"><span id="ciWhats"></span></div><div><span data-i18n="req.wa"></span><b><a href="tel:+81492574332" style="color:inherit">+81 4-9257-4332</a></b></div></div>
            <div class="row"><div class="ic"><span id="ciMail"></span></div><div><span data-i18n="req.em"></span><b><a href="mailto:info@kaiseisg.com" style="color:inherit">info@kaiseisg.com</a></b></div></div>
            <div class="row"><div class="ic"><span id="ciPhone"></span></div><div><span data-i18n="req.cc"></span><b>〒354-0021 3465 Tsuruba, Fujimi, Saitama, Japan</b></div></div>
          </div>
        </div>
        <form class="form-card" onsubmit="event.preventDefault();handleInquiry(this)">
          <div class="form-row">
            <div class="field"><label><span data-i18n="req.name"></span> <span class="req">*</span></label><input required data-i18n-ph="req.phName"></div>
            <div class="field"><label><span data-i18n="req.company"></span> <span class="req">*</span></label><input required data-i18n-ph="req.phCo"></div>
          </div>
          <div class="form-row">
            <div class="field"><label><span data-i18n="req.email"></span> <span class="req">*</span></label><input type="email" required data-i18n-ph="req.phEm"></div>
            <div class="field"><label data-i18n="req.country"></label><input data-i18n-ph="req.phCountry"></div>
          </div>
          <div class="field"><label data-i18n="req.product"></label><input data-i18n-ph="req.productPh"></div>
          <div class="field">
            <label data-i18n="req.qty"></label>
            <select>
              <option data-i18n="req.q1"></option>
              <option data-i18n="req.q2"></option>
              <option data-i18n="req.q3"></option>
              <option data-i18n="req.q4"></option>
              <option data-i18n="req.q5"></option>
            </select>
          </div>
          <div class="field"><label data-i18n="req.notes"></label><textarea data-i18n-ph="req.notesPh"></textarea></div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" data-i18n="req.send"></button>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="assets/js/data.js?v=12"></script>
  <script src="assets/js/i18n.js?v=12"></script>
  <script src="assets/js/app.js?v=12"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    const set=(id,h)=>{const e=document.getElementById(id);if(e)e.innerHTML=h;};
    function injectIcons(){
      set('moqIc', ICON.info);
      set('s1', ICON.cart); set('s2', ICON.mail); set('s3', ICON.yen); set('s4', ICON.truck);
      set('fShip1', ICON.truck); set('fShip2', ICON.ship); set('fShip3', ICON.box);
      set('ciWhats', ICON.phone); set('ciMail', ICON.mail); set('ciPhone', ICON.info);
      document.querySelectorAll('.ok-ic').forEach(e=>e.innerHTML=ICON.check);
    }
    injectIcons();
  </script>
</body>
</html>
